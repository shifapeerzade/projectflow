<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ProjectFlow</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { background: #0f1117; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .auth-wrap { background: var(--surface); border-radius: 20px; padding: 48px 44px; width: 480px; max-width: 100%; box-shadow: 0 24px 80px rgba(0,0,0,.3); }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .auth-logo .logo-icon { width: 34px; height: 34px; background: var(--brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Syne',sans-serif; font-weight: 800; color: white; font-size: 15px; }
    .auth-logo span { font-family: 'Syne',sans-serif; font-weight: 700; font-size: 18px; }
    h1 { font-family: 'Syne',sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--text-2); font-size: 14px; margin-bottom: 28px; }
    .auth-footer { margin-top: 20px; text-align: center; font-size: 13.5px; color: var(--text-2); }
    .auth-footer a { color: var(--brand); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="logo-icon">PF</div>
    <span>ProjectFlow</span>
  </div>
  <h1>Create your account</h1>
  <p class="subtitle">Start managing projects in minutes</p>

  <form id="register-form">
    <div class="form-group">
      <label class="form-label">Full name</label>
      <input type="text" class="form-input" id="name" placeholder="John Doe" required>
    </div>
    <div class="form-group">
      <label class="form-label">Email address</label>
      <input type="email" class="form-input" id="email" placeholder="you@company.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Job title</label>
      <input type="text" class="form-input" id="job_title" placeholder="e.g. Software Engineer">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="Min. 6 characters" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px" id="reg-btn">
      Create account
    </button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  btn.textContent = 'Creating account...';
  btn.disabled = true;
  try {
    const data = await API.post('/auth/register', {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      job_title: document.getElementById('job_title').value,
    });
    localStorage.setItem('pf_token', data.token);
    localStorage.setItem('pf_user', JSON.stringify(data.user));
    window.location.href = '/dashboard';
  } catch (err) {
    Toast.error(err.message || 'Registration failed');
    btn.textContent = 'Create account';
    btn.disabled = false;
  }
});
if (localStorage.getItem('pf_token')) window.location.href = '/dashboard';
</script>
</body>
</html>
